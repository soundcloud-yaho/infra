# [CD] Terraform으로 생성한 AWS 인프라를 수동으로 삭제
# DESTROY 입력 시에만 실행 (실수 방지)

name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "삭제하려면 DESTROY를 입력하세요."
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  TF_WORKING_DIR: terraform/environments/prod
  TF_IN_AUTOMATION: true

jobs:
  terraform-destroy:
    if: ${{ inputs.confirmation == 'DESTROY' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy Plan
        run: terraform plan -destroy -input=false -out=destroy.tfplan

      - name: Terraform Destroy
        run: terraform apply -input=false -auto-approve destroy.tfplan