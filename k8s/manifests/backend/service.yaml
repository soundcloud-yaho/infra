# [Backend] ClusterIP Service — ALB 타겟 연결점
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: app
  labels:
    app: backend
spec:
  type: ClusterIP           
  selector:
    app: backend          
  ports:
    - name: http
      port: 8080         
      targetPort: 8080    
      protocol: TCP