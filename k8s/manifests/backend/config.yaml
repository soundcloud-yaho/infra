# [Backend] DB 접속 설정 — 비밀 아닌 값만. DB_PASSWORD는 aurora-db-secret(Secret)에서 별도 주입
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: app
data:
  DB_WRITER_HOST: "CHANGEME_AURORA_WRITER_ENDPOINT"
  DB_READER_HOST: "CHANGEME_AURORA_READER_ENDPOINT"
  DB_USER: "postgres"
  DB_NAME: "worldcup"
  DB_PORT: "5432"