# [Tailscale] subnet router
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-router
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      nodeSelector:
        role: system
      serviceAccountName: tailscale-sa
      initContainers:
      - name: sysctler
        image: busybox
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - sysctl -w net.ipv4.ip_forward=1 && sysctl -w net.ipv6.conf.all.forwarding=1

      containers:
      - name: tailscale
        image: tailscale/tailscale:v1.98.8
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_KUBE_SECRET
          value: "tailscale-state"
        - name: TS_ROUTES
          value: "10.0.0.0/16,172.20.0.0/16"
        - name: TS_USERSPACE
          value: "false"

        securityContext:
          capabilities:
            add:
            - NET_ADMIN

        volumeMounts:
        - name: tun
          mountPath: /dev/net/tun

      volumes:
      - name: tun
        hostPath:
          path: /dev/net/tun