# [Data] 동기화 CronJob — 1시간 폴링, backend 이미지의 sync 커맨드 실행

# football-data.org 무료 티어: 분당 10회 호출 제한 (본 잡은 1회만 호출)
# 사용자 API 트래픽과 완전히 분리된 별도 잡

apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-matches
  namespace: app
spec:
  # 매 정시 실행 (분 시 일 월 요일)
  schedule: "0 * * * *"

  # 이전 잡이 끝나지 않았으면 새 잡 건너뜀
  concurrencyPolicy: Forbid

  # 완료된 잡 보관 개수
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure

          nodeSelector:
            role: worker

          containers:
            - name: sync
              # backend와 동일한 이미지 사용 — sync 커맨드만 다름
              image: 201243087060.dkr.ecr.ap-northeast-2.amazonaws.com/soundcloud-prod/backend:latest

              # 동기화 스크립트만 실행 (API 서버 X)
              command: ["python", "-m", "sync.sync_matches"]

              # backend와 동일한 Secret 사용
              # Writer 엔드포인트만 실제 사용됨 (쓰기 전용)
              envFrom:
                - secretRef:
                    name: aurora-db-secret

              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"