# [AI] Quantile Regression 권고 리포트 CronJob — 일 1회, Grafana/Slack 발송
apiVersion: batch/v1
kind: CronJob
metadata:
  name: quantile-recommend
  namespace: ai
spec:
  schedule: "0 3 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            role: ai
          tolerations:
            - key: dedicated
              operator: Equal
              value: ai
              effect: NoSchedule
          containers:
            - name: quantile-recommend
              image: 201243087060.dkr.ecr.ap-northeast-2.amazonaws.com/soundcloud-prod/ai:latest
              command: ["python", "-m", "quantile_regression.recommend"]
              env:
                - name: PROMETHEUS_URL
                  value: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
                        # kubectl get svc -n monitoring | grep prometheus 로 확인 필요 (유추값)
                - name: ANALYSIS_WINDOW_DAYS
                  value: "7"
                - name: TARGET_NODEPOOL
                  value: "spot-worker"
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: slack-webhook
                      key: SLACK_WEBHOOK_URL
              resources:
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"