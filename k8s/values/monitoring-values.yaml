grafana:
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password
  service:
    type: ClusterIP
  nodeSelector:
    role: system

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    nodeSelector:
      role: system
  service:
    type: ClusterIP

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      role: system

kube-state-metrics:
  nodeSelector:
    role: system

prometheusOperator:
  nodeSelector:
    role: system

prometheus-node-exporter:
  tolerations:
    - operator: Exists