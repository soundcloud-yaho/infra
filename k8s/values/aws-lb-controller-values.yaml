# [Values] LB Controller — clusterName/IRSA ARN <- terraform outputs에서 복사
clusterName: soundcloud-prod-eks
region: ap-northeast-2

replicaCount: 2

nodeSelector:
  role: system

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: CHANGEME_LB_CONTROLLER_ROLE_ARN   # terraform output 복사