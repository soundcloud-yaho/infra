# 모드B: 번들 Prometheus/Grafana 끄고 윤주 kube-prometheus-stack 재사용

global:
  prometheus:
    enabled: false        
    fqdn: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
  grafana:
    enabled: false        


nodeSelector:
  role: system

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
  aggregatorMetrics:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack