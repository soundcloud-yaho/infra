# [App] AI CronJob 파이프라인 — k8s/manifests/ai/ 경로 감시
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-pipeline
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/soundcloud-yaho/infra.git
    targetRevision: master
    path: k8s/manifests/ai
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true