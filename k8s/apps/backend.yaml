# [App] 백엔드 서비스 — k8s/manifests/backend/ 경로 감시
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/soundcloud-yaho/infra.git
    targetRevision: main
    path: k8s/manifests/backend      # ← 이 폴더 감시
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true