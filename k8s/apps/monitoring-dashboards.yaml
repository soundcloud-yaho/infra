apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/soundcloud-yaho/infra.git
    targetRevision: master
    path: k8s/manifests/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true